<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Vaccination reminder app icon</title>
  <desc>Minimal mature lifestyle app icon with shield and syringe</desc>

  <!-- Background -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="#00478D"/>

  <!-- Shield -->
  <path d="M512 240
           C596 240 673 261 736 300
           V467
           C736 649 621 776 512 832
           C403 776 288 649 288 467
           V300
           C351 261 428 240 512 240Z"
        fill="#F5F8FF"/>

  <!-- Syringe -->
  <g transform="translate(28,-28) rotate(-35 512 512)">
    <!-- Barrel -->
    <rect x="408" y="452" width="208" height="88" rx="28" fill="#00478D"/>
    <!-- Plunger stem -->
    <rect x="350" y="484" width="58" height="24" rx="12" fill="#00478D"/>
    <!-- Plunger head -->
    <rect x="320" y="468" width="22" height="56" rx="11" fill="#00478D"/>
    <rect x="304" y="444" width="14" height="104" rx="7" fill="#00478D"/>
    <!-- Needle hub -->
    <rect x="612" y="478" width="44" height="36" rx="14" fill="#00478D"/>
    <!-- Needle -->
    <path d="M656 496 H748" stroke="#00478D" stroke-width="16" stroke-linecap="round"/>

    <!-- Needle cap hint -->
    <rect x="596" y="468" width="16" height="56" rx="8" fill="#F5F8FF" opacity="0.18"/>
  </g>
</svg>
